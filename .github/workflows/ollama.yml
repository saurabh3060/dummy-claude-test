name: Run Ollama in GitHub Actions

on:
  workflow_dispatch:

jobs:
  ollama:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        run: |
          ollama serve > ollama.log 2>&1 &
          sleep 5

      - name: Pull model
        run: |
          ollama pull llama3.2:3b

      - name: Test model
        run: |
          ollama run llama3.2:3b "Explain GitHub Actions in one sentence."
