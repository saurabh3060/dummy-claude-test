name: AI Developer

on:
  repository_dispatch:
    types: [jira-ticket]

jobs:
  ai-dev:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          ollama serve &
          sleep 10

      - name: Pull model
        run: |
          ollama pull qwen2.5-coder:7b

      - name: Run AI Agent
        run: |
          python scripts/agent.py
        env:
          ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
          ISSUE_SUMMARY: ${{ github.event.client_payload.summary }}
          ISSUE_DESCRIPTION: ${{ github.event.client_payload.description }}
